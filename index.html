.app{max-width:520px;margin:auto;min-height:100vh;padding:22px 18px 92px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
h1{margin:0;color:#ffd087;letter-spacing:1px}
p{color:#e5d3b8}
.card{background:rgba(22,18,30,.84);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:18px;margin-bottom:14px;backdrop-filter:blur(8px)}
.btn,.pill{border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:13px 14px;background:rgba(40,30,45,.88);color:white;font-weight:800;width:100%;margin:5px 0}
.pill{width:auto}
.primary{background:linear-gradient(135deg,#ff4d94,#8d43ff);border:0}
.green{background:#123b2a;color:#a8ffd0}
.danger{background:#2b1620;color:#ffb0c8}
.input,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:rgba(10,10,20,.88);color:white;margin:7px 0;font-size:16px}
textarea{min-height:90px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sticker{min-height:122px;background:rgba(12,10,18,.76);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:10px;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.sticker img,.nav-img{object-fit:cover;border-radius:12px}
.sticker img{width:62px;height:62px}
.nav-img{width:28px;height:28px}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;margin:auto;max-width:520px;background:rgba(18,14,28,.94);border-top:1px solid rgba(255,255,255,.18);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 10px}
.bottom-nav button{background:transparent;border:0;color:#ffd9a5;display:flex;flex-direction:column;align-items:center;font-size:10px}
.bottom-nav button.active{color:#ff64a5}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.chip{display:inline-block;background:rgba(10,10,20,.75);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:9px 12px;color:#ffe0aa;font-size:13px;font-weight:700}
.avatar{width:90px;height:90px;border-radius:26px;background:linear-gradient(135deg,#8d43ff,#ff4d94);display:grid;place-items:center;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
#toast{position:fixed;bottom:90px;left:18px;right:18px;max-width:480px;margin:auto;background:rgba(32,24,59,.96);padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.18);display:none;text-align:center;font-weight:800;z-index:99}
</style>

document.querySelectorAll(".bottom-nav button").forEach(b=>b.onclick=()=>showView(b.dataset.view));
authBtn.onclick=async()=>{if(user){if(demo){demo=false;user=null;profile=null;nearby=[];authBtn.textContent="Login";render();return}await signOut(auth)}else showLogin()};
onAuthStateChanged(auth,async u=>{if(demo)return;user=u;authBtn.textContent=u?"Esci":"Login";if(u){await reload(u);if(!u.emailVerified){verifyView();return}await loadProfile();await updateLocation(false);await loadNearby()}render()});
function showView(v){view=v;render()}
function demoAccess(){demo=true;user={uid:"demo",email:DEMO_EMAIL,emailVerified:true};profile={uid:"demo",name:"Demo",age:"30",bio:"Profilo demo senza registrazione",photo:"",interests:["caffè","musica"],profileComplete:true,lat:45.99,lng:9.03};nearby=[{uid:"demo2",name:"Profilo test",age:"29",bio:"Utente dimostrativo entro 300 metri",interests:["caffè","aperitivo"],distance:120}];gps=true;authBtn.textContent="Esci";view="nearby";toast("Accesso demo attivo");render()}
window.demoAccess=demoAccess;
async function loadProfile(){const r=doc(db,"users",user.uid),s=await getDoc(r);profile=s.exists()?s.data():{uid:user.uid,email:user.email,name:"",age:"",bio:"",photo:"",interests:[],profileComplete:false,lat:null,lng:null};if(!s.exists())await setDoc(r,profile)}
async function saveProfile(){if(demo)return;await setDoc(doc(db,"users",user.uid),profile,{merge:true})}
async function updateLocation(msg=true){if(demo){gps=true;return}if(!navigator.geolocation){gps=false;return}navigator.geolocation.getCurrentPosition(async p=>{gps=true;profile.lat=p.coords.latitude;profile.lng=p.coords.longitude;await saveProfile();await loadNearby();if(msg)toast("Posizione aggiornata");render()},()=>{gps=false;if(msg)toast("Permetti il GPS")},{enableHighAccuracy:true,timeout:10000})}
async function loadNearby(){nearby=[];if(!profile.lat||!profile.lng)return;const qs=await getDocs(collection(db,"users"));qs.forEach(d=>{const u=d.data();if(!u.uid||u.uid===user.uid||!u.profileComplete||!u.lat||!u.lng)return;const dist=distance(profile.lat,profile.lng,u.lat,u.lng);if(dist<=300)nearby.push({...u,distance:Math.round(dist)})})}
function render(){document.querySelectorAll(".bottom-nav button").forEach(b=>b.classList.remove("active"));let n=document.getElementById("nav-"+view);if(n)n.classList.add("active");if(!user){content.innerHTML=home();return}if(view==="nearby")content.innerHTML=nearbyView();if(view==="profile")content.innerHTML=profileView();if(view==="stickers")content.innerHTML=stickersView();if(view==="chat")content.innerHTML=chatView();if(view==="menu")content.innerHTML='<h2>Menu</h2><div class="card"><button class="btn" onclick="showView(\'profile\')">Profilo</button><button class="btn" onclick="refreshLocation()">Aggiorna GPS</button><button class="btn danger" onclick="authBtn.click()">Esci</button></div>'}
function home(){return '<div class="card"><h2>Benvenuto</h2><p>Accedi, registrati o usa la demo.</p><button class="btn primary" onclick="showLogin()">Login / Registrati</button><button class="btn green" onclick="demoAccess()">Entra in demo</button><p>Demo: '+DEMO_EMAIL+' / '+DEMO_PASSWORD+'</p></div>'}
window.showLogin=()=>{content.innerHTML='<div class="card"><h2>Login / Registrazione</h2><input class="input" id="email" placeholder="Email"><input class="input" id="password" placeholder="Password" type="password"><div class="grid2"><button class="btn primary" onclick="login()">Accedi</button><button class="btn" onclick="register()">Registrati</button></div><button class="btn green" onclick="demoAccess()">Entra in demo senza registrazione</button><p>La registrazione invia una mail di verifica.</p></div>'}
window.login=async()=>{try{let e=val("email"),p=val("password");if(e===DEMO_EMAIL&&p===DEMO_PASSWORD){demoAccess();return}await signInWithEmailAndPassword(auth,e,p);await reload(auth.currentUser);if(!auth.currentUser.emailVerified){verifyView();toast("Verifica la mail");return}view="nearby";render()}catch(err){toast("Errore login: "+err.code)}}
window.register=async()=>{try{let c=await createUserWithEmailAndPassword(auth,val("email"),val("password"));await sendEmailVerification(c.user);verifyView();toast("Controlla la mail")}catch(err){toast("Errore registrazione: "+err.code)}}
function verifyView(){content.innerHTML='<div class="card"><h2>Verifica email richiesta</h2><p>Apri la mail e conferma il link Firebase.</p><button class="btn primary" onclick="checkEmail()">Ho verificato la mail</button><button class="btn" onclick="resendEmail()">Reinvia email</button><button class="btn danger" onclick="authBtn.click()">Esci</button></div>'}
window.checkEmail=async()=>{await reload(auth.currentUser);if(auth.currentUser.emailVerified){await loadProfile();view="profile";render()}else toast("Email non ancora verificata")}
window.resendEmail=async()=>{await sendEmailVerification(auth.currentUser);toast("Email reinviata")}
function nearbyView(){let h='<h2>Persone vicine</h2><div class="notice">Qui vedi chi è entro 300 metri.</div><button class="btn green" onclick="refreshLocation()">Aggiorna posizione GPS</button>';if(demo)h+='<div class="notice">Modalità demo attiva.</div>';if(!profile.profileComplete)return h+'<div class="card"><h2>Profilo non completo</h2><p>Completa foto, nome e interessi.</p><button class="btn primary" onclick="showView(\'profile\')">Completa profilo</button></div>';if(!gps)return h+'<div class="card"><h2>GPS non attivo</h2></div>';if(!nearby.length)return h+'<div class="card"><h2>Nessun utente entro 300 m</h2></div>';return h+nearby.map(u=>'<div class="card"><h2>'+esc(u.name)+' '+(u.age||'')+'</h2><p>'+u.distance+' m</p><p>'+esc(u.bio||'')+'</p><button class="btn primary" onclick="openChat(\''+u.uid+'\')">Apri chat</button></div>').join('')}
function profileView(){let p=profile;return '<h2>Il mio profilo</h2><div class="card"><div class="avatar" id="photoPreview">'+(p.photo?'<img src="'+p.photo+'">':'🙂')+'</div><label class="btn">Carica foto<input style="display:none" type="file" accept="image/*" onchange="loadPhoto(event)"></label><input class="input" id="pname" placeholder="Nome" value="'+esc(p.name||'')+'"><input class="input" id="page" placeholder="Età" value="'+esc(p.age||'')+'"><textarea id="pbio" placeholder="Bio">'+esc(p.bio||'')+'</textarea><div class="chips">'+interests.map(i=>'<label><input type="checkbox" value="'+i+'" '+((p.interests||[]).includes(i)?'checked':'')+'> <span class="chip">'+i+'</span></label>').join('')+'</div><button class="btn primary" onclick="saveProfileBtn()">Salva profilo</button></div>'}
window.loadPhoto=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{profile.photo=x.target.result;document.getElementById("photoPreview").innerHTML='<img src="'+profile.photo+'">'};r.readAsDataURL(f)}
window.saveProfileBtn=async()=>{profile.name=val("pname");profile.age=val("page");profile.bio=val("pbio");profile.interests=[...document.querySelectorAll('input[type=checkbox]:checked')].map(x=>x.value);profile.profileComplete=!!(profile.name&&profile.photo&&profile.interests.length);await saveProfile();if(!profile.profileComplete){toast("Servono nome, foto e almeno un interesse");return}toast("Profilo salvato");await updateLocation(false);view="nearby";render()}
function stickersView(){return '<h2>Sticker</h2><div class="grid3">'+stickerImgs.map(s=>'<button class="sticker"><img src="'+s[0]+'"><span>'+s[1]+'</span></button>').join('')+'</div>'}

function chatView(){
  if(demo){
    return '<h2>Chat</h2><div class="card"><h2>Profilo test</h2><div class="notice">Modalità demo: chat dimostrativa.</div><p><b>Profilo test:</b> Ciao, sono vicino a te.</p><p><b>Tu:</b> Messaggio demo.</p><input class="input" id="chatText" placeholder="Scrivi un messaggio"><button class="btn primary" onclick="sendChatMessage()">Invia messaggio demo</button></div>';
  }
  if(!selectedChat){
    if(!nearby.length){
      return '<h2>Chat</h2><div class="card"><p>Prima devi trovare una persona in Vicini.</p><button class="btn primary" onclick="showView(\'nearby\')">Vai a Vicini</button></div>';
    }
    selectedChat=nearby[0].uid;
  }
  const other=nearby.find(x=>x.uid===selectedChat)||{name:"Utente"};
  const list=chatMessages.filter(m=>(m.from===user.uid&&m.to===selectedChat)||(m.from===selectedChat&&m.to===user.uid));
  return '<h2>Chat</h2><div class="card"><h2>'+esc(other.name||"Utente")+'</h2><div id="chatBox">'+(list.length?list.map(m=>'<p><b>'+(m.from===user.uid?'Tu':esc(other.name||"Utente"))+':</b> '+esc(m.text)+'</p>').join(''):'<p class="bio">Nessun messaggio ancora.</p>')+'</div><input class="input" id="chatText" placeholder="Scrivi un messaggio"><button class="btn primary" onclick="sendChatMessage()">Invia</button><button class="btn" onclick="loadChatMessages()">Aggiorna chat</button></div>';
}

window.openChat=async(uid)=>{
  selectedChat=uid;
  view="chat";
  await loadChatMessages();
  render();
};

async function loadChatMessages(){
  chatMessages=[];
  if(demo)return;
  if(!user)return;
  const qs=await getDocs(collection(db,"messages"));
  qs.forEach(d=>{
    const m=d.data();
    if((m.from===user.uid)||(m.to===user.uid)) chatMessages.push(m);
  });
  chatMessages.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
  render();
}

window.loadChatMessages=loadChatMessages;

window.sendChatMessage=async()=>{
  const text=val("chatText");
  if(!text){toast("Scrivi un messaggio");return;}
  if(demo){toast("Messaggio demo inviato");document.getElementById("chatText").value="";return;}
  if(!selectedChat){toast("Seleziona prima una persona");return;}
  await addDoc(collection(db,"messages"),{
    from:user.uid,
    to:selectedChat,
    text:text,
    createdAt:serverTimestamp()
  });
  document.getElementById("chatText").value="";
  toast("Messaggio inviato");
  await loadChatMessages();
};

window.refreshLocation=()=>updateLocation(true)
function val(id){return document.getElementById(id)?.value?.trim()||""}
function distance(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,dl=rad(c-a),dn=rad(d-b),x=Math.sin(dl/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function toast(m){let t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(()=>t.style.display="none",3500)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
window.showView=showView;
render();
</script>
</body>
</html>
