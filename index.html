<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet & React</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

<h1 class="app-title">Meet & React</h1>
<p class="app-subtitle">Persone reali entro 300 metri</p>

<section class="card">
<h2 class="menu-title">Persone vicine</h2>
<p class="menu-text">Scopri chi è entro 300 metri.</p>
<button class="wood-btn">Aggiorna posizione GPS</button>
</section>

<section class="card">
<h2 class="menu-title">Profilo</h2>

<div class="profile-pic">🙂</div>

<input type="text" placeholder="Nome">
<input type="number" placeholder="Età">

<textarea placeholder="Breve bio"></textarea>

<h3 class="small-title">Interessi</h3>
<div class="tags">
<span>musica</span>
<span>montagna</span>
<span>caffè</span>
<span>aperitivo</span>
<span>viaggi</span>
<span>metal detecting</span>
</div>

<button class="wood-btn">Salva profilo</button>
</section>

<section class="card">
<h2 class="menu-title">Sfida a tris</h2>
<p class="menu-text">Sfida simpatica per ottenere una chat bonus.</p>
<button class="wood-btn">Avvia sfida</button>
</section>

<nav class="bottom-bar">
<div class="nav-item active">🧭<br><span>Vicini</span></div>
<div class="nav-item">🎟️<br><span>Sticker</span></div>
<div class="nav-item">💬<br><span>Chat</span></div>
<div class="nav-item">👤<br><span>Profilo</span></div>
<div class="nav-item">⚙️<br><span>Menu</span></div>
</nav>

</div>

</body>
</html>
